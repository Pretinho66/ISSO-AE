<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MK · Luta Sombria · Remaster</title>
  <style>
    /* ===== style.css ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial Black', 'Impact', sans-serif;
    }

    .game-wrapper {
      background: #1a1010;
      padding: 20px;
      border-radius: 40px 40px 20px 20px;
      box-shadow: 0 0 40px rgba(180, 20, 20, 0.3), inset 0 0 30px #2a1a1a;
      border: 2px solid #4a2a2a;
    }

    .game-container {
      position: relative;
      width: 1000px;
      max-width: 100%;
      aspect-ratio: 16/9;
      background: radial-gradient(circle at 20% 30%, #2a1a1a, #0a0505);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.9), 0 0 50px #3a0f0f;
      border: 2px solid #5a2a2a;
    }

    .arena-fog {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, rgba(40, 20, 20, 0.2) 0px, rgba(0, 0, 0, 0.4) 40px);
      pointer-events: none;
      z-index: 1;
    }

    /* barras de vida */
    .health-bars {
      position: absolute;
      top: 20px;
      left: 30px;
      right: 30px;
      display: flex;
      justify-content: space-between;
      z-index: 20;
      gap: 20px;
      pointer-events: none;
    }

    .health-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .health-wrap.p1 { align-items: flex-start; }
    .health-wrap.p2 { align-items: flex-end; }

    .health-label {
      color: #ccc;
      font-size: 1.2rem;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #a00;
      background: rgba(0,0,0,0.5);
      padding: 0 12px;
      border-radius: 20px;
    }

    .health-track {
      width: 100%;
      height: 22px;
      background: #221111;
      border-radius: 30px;
      border: 2px solid #553333;
      overflow: hidden;
      box-shadow: inset 0 0 10px #000;
    }

    .health-fill {
      height: 100%;
      width: 100%;
      transition: width 0.2s ease;
      background: #c02020;
      box-shadow: 0 0 20px #f22;
    }

    .p2 .health-fill {
      background: #2060c0;
      box-shadow: 0 0 20px #2af;
    }

    .timer {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: #0a0a0a;
      padding: 4px 24px;
      border-radius: 40px;
      border: 2px solid #933;
      color: #f0d0d0;
      font-size: 2.2rem;
      font-weight: bold;
      text-shadow: 0 0 20px #f44;
      letter-spacing: 4px;
      pointer-events: none;
    }

    /* ===== NOVOS PERSONAGENS ESTILIZADOS ===== */
    .fighter {
      position: absolute;
      bottom: 40px;
      width: 90px;
      height: 140px;
      z-index: 10;
      transition: left 0.08s linear, transform 0.1s;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .fighter.p1 {
      left: 160px;
    }

    .fighter.p2 {
      right: 160px;
    }

    /* corpo principal */
    .fighter .torso {
      width: 70px;
      height: 70px;
      border-radius: 30% 30% 20% 20% / 40% 40% 20% 20%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.1s;
    }

    .p1 .torso {
      background: radial-gradient(ellipse at 30% 20%, #ff5555, #881111);
      border: 3px solid #cc4444;
      box-shadow: 0 0 30px #ff2222, inset 0 -20px 30px #550000;
    }

    .p2 .torso {
      background: radial-gradient(ellipse at 70% 20%, #5588ff, #1133aa);
      border: 3px solid #4488ff;
      box-shadow: 0 0 30px #2266ff, inset 0 -20px 30px #001166;
    }

    /* cabeça */
    .fighter .head {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-bottom: -8px;
      position: relative;
      z-index: 2;
      border: 3px solid rgba(255,255,200,0.3);
      transition: all 0.1s;
    }

    .p1 .head {
      background: radial-gradient(circle at 40% 30%, #ff6666, #aa2222);
      box-shadow: 0 0 20px #ff4444;
    }

    .p2 .head {
      background: radial-gradient(circle at 60% 30%, #6699ff, #2244aa);
      box-shadow: 0 0 20px #4488ff;
    }

    /* olhos */
    .fighter .eye {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      top: 18px;
      box-shadow: 0 0 10px #fff;
    }

    .fighter .eye.left { left: 8px; }
    .fighter .eye.right { right: 8px; }

    .fighter .eye::after {
      content: '';
      display: block;
      width: 5px;
      height: 5px;
      background: #111;
      border-radius: 50%;
      margin: 2px 0 0 3px;
      transition: 0.1s;
    }

    /* braços */
    .fighter .arm {
      position: absolute;
      width: 16px;
      height: 50px;
      border-radius: 20px;
      top: 10px;
      transition: transform 0.15s ease;
      transform-origin: top center;
    }

    .p1 .arm {
      background: radial-gradient(ellipse at 50% 30%, #dd4444, #771111);
      border: 2px solid #aa3333;
    }

    .p2 .arm {
      background: radial-gradient(ellipse at 50% 30%, #4477dd, #112277);
      border: 2px solid #3366bb;
    }

    .fighter .arm.left {
      left: -10px;
      transform: rotate(20deg);
    }

    .fighter .arm.right {
      right: -10px;
      transform: rotate(-20deg);
    }

    /* pernas */
    .fighter .legs {
      display: flex;
      gap: 8px;
      margin-top: -5px;
      transition: all 0.1s;
    }

    .fighter .leg {
      width: 22px;
      height: 40px;
      border-radius: 0 0 12px 12px;
      transition: all 0.1s;
    }

    .p1 .leg {
      background: linear-gradient(to bottom, #661111, #330000);
      border-left: 2px solid #883333;
      border-right: 2px solid #883333;
    }

    .p2 .leg {
      background: linear-gradient(to bottom, #112266, #000033);
      border-left: 2px solid #334488;
      border-right: 2px solid #334488;
    }

    /* ===== ANIMAÇÕES DE ATAQUE ===== */
    .fighter.attacking .arm.right {
      animation: punchAnim 0.2s ease forwards;
    }

    .fighter.kicking .leg:last-child {
      animation: kickAnim 0.25s ease forwards;
    }

    .fighter.special .torso {
      animation: specialGlow 0.3s ease;
    }

    @keyframes punchAnim {
      0% { transform: rotate(-20deg) translateX(0); }
      50% { transform: rotate(-80deg) translateX(30px) scale(1.3); }
      100% { transform: rotate(-20deg) translateX(0); }
    }

    @keyframes kickAnim {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(40deg) scale(1.4) translateX(20px); }
      100% { transform: rotate(0deg) scale(1); }
    }

    @keyframes specialGlow {
      0% { filter: brightness(1); transform: scale(1); }
      50% { filter: brightness(2) drop-shadow(0 0 40px #ff0); transform: scale(1.1); }
      100% { filter: brightness(1); transform: scale(1); }
    }

    .fighter.blocking .torso {
      filter: brightness(0.5);
      transform: scale(0.9) translateY(10px);
    }

    .fighter.hit {
      animation: flinch 0.2s ease;
    }

    @keyframes flinch {
      0% { transform: translateX(0); }
      25% { transform: translateX(-15px) rotate(-5deg); }
      75% { transform: translateX(15px) rotate(5deg); }
      100% { transform: translateX(0); }
    }

    /* efeitos de golpe */
    .hit-effect {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffcc44, #ff6600);
      opacity: 0.8;
      transform: scale(0);
      animation: hitPop 0.25s ease-out forwards;
      pointer-events: none;
      z-index: 30;
    }

    @keyframes hitPop {
      0% { transform: scale(0.2); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    .screen-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      font-weight: bold;
      color: #f0d0a0;
      text-shadow: 0 0 40px #f44, 0 0 80px #a00;
      z-index: 40;
      pointer-events: none;
      letter-spacing: 10px;
      background: rgba(0,0,0,0.5);
      padding: 20px 60px;
      border-radius: 40px;
      border: 3px solid #a33;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .screen-text.show {
      opacity: 1;
    }

    .history {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      background: rgba(0,0,0,0.7);
      color: #ddd;
      padding: 4px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      border: 1px solid #555;
      max-width: 80%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .restart-btn {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: #2a0f0f;
      border: 3px solid #a33;
      color: #f0d0d0;
      font-size: 1.5rem;
      padding: 8px 40px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 4px;
      box-shadow: 0 0 30px #a00;
      transition: 0.2s;
      display: none;
    }

    .restart-btn:hover {
      background: #4a1a1a;
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 0 60px #f44;
    }

    @media (max-width: 700px) {
      .health-label { font-size: 0.8rem; }
      .timer { font-size: 1.4rem; padding: 2px 14px; }
      .fighter { transform: scale(0.7); transform-origin: bottom center; }
      .screen-text { font-size: 2.8rem; padding: 10px 30px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-container" id="gameContainer">
    <div class="arena-fog"></div>

    <!-- barras de vida -->
    <div class="health-bars">
      <div class="health-wrap p1">
        <div class="health-label">P1 · VERMELHO</div>
        <div class="health-track"><div class="health-fill" id="healthP1" style="width:100%"></div></div>
      </div>
      <div class="health-wrap p2">
        <div class="health-label">P2 · AZUL</div>
        <div class="health-track"><div class="health-fill" id="healthP2" style="width:100%"></div></div>
      </div>
    </div>
    <div class="timer" id="timerDisplay">60</div>

    <!-- fighters -->
    <div class="fighter p1" id="fighter1">
      <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
      </div>
      <div class="torso">
        <div class="arm left"></div>
        <div class="arm right"></div>
      </div>
      <div class="legs">
        <div class="leg"></div>
        <div class="leg"></div>
      </div>
    </div>

    <div class="fighter p2" id="fighter2">
      <div class="head">
        <div class="eye left"></div>
        <div class="eye right"></div>
      </div>
      <div class="torso">
        <div class="arm left"></div>
        <div class="arm right"></div>
      </div>
      <div class="legs">
        <div class="leg"></div>
        <div class="leg"></div>
      </div>
    </div>

    <!-- textos -->
    <div class="screen-text" id="screenText">FIGHT!</div>
    <div class="history" id="historyLog">⚔️ 準備</div>
    <button class="restart-btn" id="restartBtn">↺ REINICIAR</button>
  </div>
</div>

<script>
  // ===== main.js =====
  (function() {
    'use strict';

    // DOM
    const p1 = document.getElementById('fighter1');
    const p2 = document.getElementById('fighter2');
    const healthP1 = document.getElementById('healthP1');
    const healthP2 = document.getElementById('healthP2');
    const timerDisplay = document.getElementById('timerDisplay');
    const screenText = document.getElementById('screenText');
    const historyLog = document.getElementById('historyLog');
    const restartBtn = document.getElementById('restartBtn');
    const container = document.getElementById('gameContainer');

    // estado
    const state = {
      p1: { x: 160, y: 0, hp: 100, maxHp: 100, hitCooldown: 0, specialCooldown: 0, block: false, combo: 0 },
      p2: { x: 770, y: 0, hp: 100, maxHp: 100, hitCooldown: 0, specialCooldown: 0, block: false, combo: 0 },
      timer: 60,
      round: 1,
      p1Wins: 0,
      p2Wins: 0,
      fighting: false,
      ko: false,
      winner: null,
      roundActive: false,
      screenTimeout: null,
    };

    // teclas
    const keys = {};

    // helpers
    function updateUI() {
      healthP1.style.width = Math.max(0, (state.p1.hp / state.p1.maxHp) * 100) + '%';
      healthP2.style.width = Math.max(0, (state.p2.hp / state.p2.maxHp) * 100) + '%';
      p1.style.left = state.p1.x + 'px';
      p2.style.left = state.p2.x + 'px';
    }

    function showScreenText(text, duration = 800) {
      screenText.textContent = text;
      screenText.classList.add('show');
      if (state.screenTimeout) clearTimeout(state.screenTimeout);
      state.screenTimeout = setTimeout(() => {
        screenText.classList.remove('show');
      }, duration);
    }

    function addHistory(msg) {
      historyLog.textContent = '⚡ ' + msg + ' | ' + historyLog.textContent.slice(0, 40);
    }

    function shakeScreen(intensity = 6) {
      container.style.transition = 'transform 0.05s';
      container.style.transform = `translate(${Math.random()*intensity - intensity/2}px, ${Math.random()*intensity - intensity/2}px)`;
      setTimeout(() => { container.style.transform = 'translate(0,0)'; }, 100);
    }

    // partículas de sangue (estilizado)
    function spawnBlood(x, y) {
      for (let i = 0; i < 10; i++) {
        const el = document.createElement('div');
        el.style.cssText = `
          position: absolute; left:${x}px; top:${y}px;
          width: ${8+Math.random()*15}px; height: ${8+Math.random()*15}px;
          background: radial-gradient(circle, #c00, #600);
          border-radius: 50%;
          pointer-events: none; z-index:35;
          opacity: 0.9;
          transition: all 0.5s ease-out;
        `;
        container.appendChild(el);
        const dx = (Math.random()-0.5)*120, dy = (Math.random()-0.5)*120 - 30;
        setTimeout(() => {
          el.style.transform = `translate(${dx}px, ${dy}px) scale(0.2)`;
          el.style.opacity = '0';
        }, 10);
        setTimeout(() => el.remove(), 600);
      }
    }

    // animação de ataque
    function animateAttack(player, type) {
      const el = player === 1 ? p1 : p2;
      el.classList.remove('attacking', 'kicking', 'special');
      if (type === 'punch') {
        el.classList.add('attacking');
        setTimeout(() => el.classList.remove('attacking'), 300);
      } else if (type === 'kick') {
        el.classList.add('kicking');
        setTimeout(() => el.classList.remove('kicking'), 300);
      } else if (type === 'special') {
        el.classList.add('special');
        setTimeout(() => el.classList.remove('special'), 400);
      }
    }

    // golpe
    function applyHit(attacker, defender, damage, knockback = 30, isSpecial = false) {
      if (state.ko || !state.roundActive) return;
      if (defender.block) {
        damage = Math.floor(damage * 0.3);
        addHistory('🛡️ Defesa!');
        if (damage < 1) return;
      }
      defender.hp = Math.max(0, defender.hp - damage);
      defender.hitCooldown = 10;
      
      // flinch / knockback
      const dir = attacker === state.p1 ? 1 : -1;
      defender.x = Math.min(850, Math.max(50, defender.x + dir * knockback));
      updateUI();
      spawnBlood(defender.x + 30, 80);
      shakeScreen(damage > 10 ? 10 : 5);

      // animação de hit no defensor
      const defEl = defender === state.p1 ? p1 : p2;
      defEl.classList.remove('hit');
      void defEl.offsetWidth;
      defEl.classList.add('hit');
      setTimeout(() => defEl.classList.remove('hit'), 300);

      if (isSpecial) addHistory(`💥 ESPECIAL! -${damage}`);
      else addHistory(`💢 -${damage}`);

      if (defender.hp <= 0) {
        defender.hp = 0;
        state.ko = true;
        state.roundActive = false;
        state.winner = attacker === state.p1 ? 'P1' : 'P2';
        showScreenText('K.O.!', 1200);
        setTimeout(() => {
          showScreenText(`${state.winner} VENCEU!`, 2000);
          restartBtn.style.display = 'block';
        }, 800);
        addHistory(`🏆 ${state.winner} VENCEU!`);
      }
    }

    // ataque
    function attack(player, type) {
      if (state.ko || !state.roundActive) return;
      const attacker = player === 1 ? state.p1 : state.p2;
      const defender = player === 1 ? state.p2 : state.p1;
      
      const dist = Math.abs(attacker.x - defender.x);
      if (dist > 110) { addHistory('❌ longe'); return; }

      animateAttack(player, type);

      let damage = 0, knock = 20, special = false;
      if (type === 'punch') { damage = 5; knock = 15; }
      else if (type === 'kick') { damage = 8; knock = 25; }
      else if (type === 'special') {
        if (attacker.specialCooldown > 0) { addHistory('⏳ recarga especial'); return; }
        damage = 15; knock = 40; special = true;
        attacker.specialCooldown = 300;
        // efeito flash
        const el = player === 1 ? p1 : p2;
        el.style.filter = 'brightness(2) drop-shadow(0 0 40px #ff0)';
        setTimeout(() => el.style.filter = '', 300);
      }
      applyHit(attacker, defender, damage, knock, special);

      // Efeito hit visual
      const hitEl = document.createElement('div');
      hitEl.className = 'hit-effect';
      const cx = (attacker.x + defender.x) / 2;
      hitEl.style.left = (cx - 30) + 'px';
      hitEl.style.top = '60px';
      container.appendChild(hitEl);
      setTimeout(() => hitEl.remove(), 300);
    }

    // reset round
    function resetRound() {
      state.p1.hp = state.p1.maxHp;
      state.p2.hp = state.p2.maxHp;
      state.p1.x = 160;
      state.p2.x = 770;
      state.p1.hitCooldown = 0;
      state.p2.hitCooldown = 0;
      state.p1.specialCooldown = 0;
      state.p2.specialCooldown = 0;
      state.p1.block = false;
      state.p2.block = false;
      state.ko = false;
      state.winner = null;
      state.roundActive = true;
      state.timer = 60;
      timerDisplay.textContent = '60';
      restartBtn.style.display = 'none';
      p1.classList.remove('blocking');
      p2.classList.remove('blocking');
      updateUI();
      showScreenText('FIGHT!', 700);
      addHistory('⚔️ Round ' + state.round);
    }

    // next round
    function nextRound() {
      if (state.p1Wins >= 2 || state.p2Wins >= 2) {
        restartBtn.style.display = 'block';
        showScreenText(`🏆 ${state.p1Wins>state.p2Wins?'P1':'P2'} CAMPEÃO!`, 3000);
        return;
      }
      state.round++;
      resetRound();
    }

    // game loop
    function gameLoop() {
      if (state.roundActive && !state.ko) {
        // timer
        if (state.timer > 0) {
          state.timer -= 1/60;
          timerDisplay.textContent = Math.ceil(state.timer);
        } else {
          state.timer = 0;
          timerDisplay.textContent = '0';
          state.roundActive = false;
          if (state.p1.hp > state.p2.hp) { state.p1Wins++; showScreenText('P1 VENCE!', 1000); }
          else if (state.p2.hp > state.p1.hp) { state.p2Wins++; showScreenText('P2 VENCE!', 1000); }
          else { showScreenText('EMPATE!', 1000); }
          setTimeout(() => { nextRound(); }, 1500);
        }

        // cooldowns
        if (state.p1.specialCooldown > 0) state.p1.specialCooldown--;
        if (state.p2.specialCooldown > 0) state.p2.specialCooldown--;
        if (state.p1.hitCooldown > 0) state.p1.hitCooldown--;
        if (state.p2.hitCooldown > 0) state.p2.hitCooldown--;

        // movimentação
        const speed = 4;
        // P1
        if (keys['w'] && state.p1.y === 0) { state.p1.y = -60; setTimeout(() => { state.p1.y = 0; }, 300); }
        if (keys['a']) state.p1.x = Math.max(50, state.p1.x - speed);
        if (keys['d']) state.p1.x = Math.min(850, state.p1.x + speed);
        state.p1.block = keys['s'] ? true : false;
        p1.classList.toggle('blocking', state.p1.block);

        // P2
        if (keys['ArrowUp'] && state.p2.y === 0) { state.p2.y = -60; setTimeout(() => { state.p2.y = 0; }, 300); }
        if (keys['ArrowLeft']) state.p2.x = Math.max(50, state.p2.x - speed);
        if (keys['ArrowRight']) state.p2.x = Math.min(850, state.p2.x + speed);
        state.p2.block = keys['ArrowDown'] ? true : false;
        p2.classList.toggle('blocking', state.p2.block);

        // ATAQUES - P1
        if (keys['j']) { attack(1, 'punch'); keys['j'] = false; }
        if (keys['k']) { attack(1, 'kick'); keys['k'] = false; }
        if (keys['l']) { attack(1, 'special'); keys['l'] = false; }

        // ATAQUES - P2 (CORRIGIDO)
        if (keys['1']) { attack(2, 'punch'); keys['1'] = false; }
        if (keys['2']) { attack(2, 'kick'); keys['2'] = false; }
        if (keys['3']) { attack(2, 'special'); keys['3'] = false; }

        updateUI();
      }
      requestAnimationFrame(gameLoop);
    }

    // eventos teclado
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      keys[key] = true;
      // Prevenir comportamentos padrão
      if (['j','k','l','1','2','3','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(key)) {
        e.preventDefault();
      }
      
      // Fatality secreto: ↓↓→ + J (P1) / ↓↓→ + 1 (P2)
      if (key === 'j' && keys['ArrowDown'] && keys['ArrowDown'] && keys['ArrowRight']) {
        if (state.p2.hp > 0 && state.p2.hp <= 30 && state.roundActive) {
          state.p2.hp = 0;
          showScreenText('FATALITY!', 1200);
          addHistory('💀 FATALITY!');
          updateUI();
          state.ko = true;
          state.roundActive = false;
          setTimeout(() => { nextRound(); }, 2000);
        }
      }
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    // restart
    restartBtn.addEventListener('click', () => {
      state.p1Wins = 0; state.p2Wins = 0; state.round = 1;
      resetRound();
      restartBtn.style.display = 'none';
    });

    // inicia
    resetRound();
    gameLoop();

    // prevenir scroll
    window.addEventListener('keydown', (e) => {
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    });

  })();
</script>
</body>
</html>
